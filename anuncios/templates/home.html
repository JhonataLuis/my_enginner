{% extends 'base.html' %}

{% block content %}
<h1>Imóveis Disponíveis</h1>

<div class="row">
    {% for anuncio in anuncios %}
        <div class="col-md-4 mb-4">
            <div class="card h-100">
                {% with primeira_imagem=anuncio.imagens.first %}
                    {% if primeira_imagem %}
                        <img src="{{ primeira_imagem.imagem.url }}" class="card-img-top" style="height: 200px; object-fit: cover;" alt="{{ anuncio.titulo }}">
                    {% else %}
                    <div class="bg-secondary text-white d-flex align-items-center justify-content-center" style="height: 200px;">
                        Sem imagem
                    </div>
                    {% endif %}
                {% endwith %}

                <div class="card-body">
                    <h5>{{ anuncio.titulo }}</h5>
                </div>
            </div>

        </div>
</div>
