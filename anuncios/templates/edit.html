{% extends 'base.html' %}

{% block content %}

<style>
    .card img{
    transition: transform .3s;
    }

    .card:hover img{
    transform: scale(1.05);
    }
</style>
<div class="container mt-4">
    <h2 class="mb-4">Editar Anúncio</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body">
                {{ form.as_p }}
                <div class="mb-3">
                    <label class="form-label">Adicionar novas imagens</label>
                    <input type="file" name="imagens" multiple class="form-control">
                </div>
            </div>
        </div>

        <!-- Imagens Atuais -->
         <div class="card mb-4">
            <div class="card-header">
                Imagens do anúncio
            </div>

            <div class="card-body">
                <div class="row">
                    {% for imagem in anuncio.imagens.all %}
                    <div class="col-md-3 bm-3">
                        <div class="card">
                            <img src="{{ imagem.imagem.url }}" class="img-fluid" style="height:120px; object-fit: cover;">
                            <div class="card-body text-center">
                                <a href="">
                                    Remover
                                </a>
                            </div>
                        </div>
                    </div>
                    {% empty %}
                    <p>Nenhuma imagem cadastrada.</p>
                    {% endfor %}
                </div>
            </div>
         </div>
         <div class="d-flex justify-content-between">
            <a href="{% url 'home' %}" class="btn btn-secondary btn-sm"><i class="bi bi-arrow-left"></i> Cancelar</a>
            <button type="submit" class="btn btn-success btn-sm"><i class="bi bi-check-fill"></i> Salvar alterações</button>
         </div>
    </form>
</div>
{% endblock %}
